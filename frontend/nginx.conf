server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Repassa /api para o backend Spring Boot dentro da rede do docker-compose,
    # evitando expor a porta 8080 diretamente no navegador e problemas de CORS
    # em produção (ver docs/09-seguranca.md e environment.prod.ts).
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Fallback de SPA: qualquer rota não encontrada como arquivo estático
    # cai no index.html, deixando o Angular Router decidir a tela.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets com hash no nome podem ser cacheados agressivamente.
    location ~* \.(?:js|css|woff2?|ttf|svg|png|jpg|jpeg|gif|ico)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
