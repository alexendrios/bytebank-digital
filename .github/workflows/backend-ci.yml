name: Backend CI

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    env:
      TESTCONTAINERS_RYUK_DISABLED: "true"
      MAVEN_OPTS: "-Djava.awt.headless=true"

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build (compile)
        run: mvn -B -ntp clean compile

      - name: Verificar Docker/Testcontainers
        run: |
          docker --version
          docker info

      # O runner ubuntu-latest já vem com Docker instalado e em execução,
      # necessário para os testes de integração com Testcontainers.
      - name: Rodar testes (unitários + integração + API)
        run: mvn -B -ntp test

      - name: Listar relatórios gerados
        if: always()
        run: |
          echo "Arquivos XML de teste encontrados:"
          find backend/target -type f \( -name "TEST-*.xml" -o -name "*.xml" \) | sort || true

      - name: Publicar relatório de testes
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Resultado dos Testes (JUnit)
          path: |
            backend/target/surefire-reports/**/*.xml
            backend/target/failsafe-reports/**/*.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload dos relatórios (em caso de falha)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: backend/target/surefire-reports/
          retention-days: 7

      - name: Empacotar (package)
        run: mvn -B -ntp package -DskipTests

      - name: Upload do artefato JAR
        uses: actions/upload-artifact@v4
        with:
          name: bytebank-digital-jar
          path: backend/target/bytebank-digital.jar
          retention-days: 14

  docker-build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test
    # Só publica a imagem em push na main (não em Pull Requests)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Login no GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extrair metadados (tags/labels) da imagem
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build e push da imagem
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
